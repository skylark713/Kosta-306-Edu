<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
        div {
            width: 200px;
            height: 200px;
        }
        
        div.a {
            background-color: red;
            padding-top: 20px;
            padding-bottom: 50px;
            padding-left: 30px;
        }
        
        div.b {
            background-color: green;
            padding: 20px;
            border: solid 10px yellow;
            box-sizing: border-box;
            /*width, height 유지*/
        }
        
        div.c {
            background-color: blue;
            border-style: solid dotted;
            border-color: violet aquamarine pink;
            border-width: 10px 20px 5px 3px;
            border-radius: 50px 30px;
            text-align: center;
            color: white;
            vertical-align: middle;
            /* display: table-cell; */
            align-content: center;
        }
    </style>
</head>

<body>
    <div class="a">box모델</div>
    <div class="b">box모델</div>
    <div class="c">box모델</div>
</body>

</html>
