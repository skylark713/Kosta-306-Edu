<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .main {
        height: 100vh;
        display: grid;
        /* grid-template-columns: 100px 200px 100px; */
        /* grid-template-columns: repeat(3, 100px); */
        /* grid-template-columns: 100px auto 150px; */
        grid-template-columns: 1fr 2fr 3fr;
        /*fraction 사용 가능한 공간을 비율로 나눌 때 쓰는 단위*/
        /* grid-template-rows: 100px 200px 150px; */
        grid-auto-rows: 100px;
        row-gap: 5px;
        column-gap: 10px;
      }

      img {
        width: 100%;
        height: 100%;
        opacity: 0.8;
        border-radius: 10px;
      }

      .img1 {
        grid-column-start: 1;
        grid-column-end: 3;
        grid-row-start: 1;
        grid-row-end: 3;
      }

      .img2 {
        grid-column: 3/4;
        grid-row: 1/4;
      }

      .img3 {
        grid-column: 1 / span 2;
        grid-row: 3 / span 2;
      }
    </style>
  </head>

  <body>
    <div class="main">
      <img src="https://picsum.photos/id/100/200/200" alt="" class="img1" />
      <img src="https://picsum.photos/id/110/200/200" alt="" class="img2" />
      <img src="https://picsum.photos/id/102/200/200" alt="" class="img3" />
      <img src="https://picsum.photos/id/103/200/200" alt="" class="img4" />
      <img src="https://picsum.photos/id/104/200/200" alt="" class="img5" />
      <img src="https://picsum.photos/id/108/200/200" alt="" class="img6" />
      <img src="https://picsum.photos/id/106/200/200" alt="" class="img7" />
    </div>
  </body>
</html>
