<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
        /* body,
      html {
          height: 100%;
      } */
        
        .outer {
            background-color: skyblue;
            /* width: 50%;
          height: 50%; */
            width: 50vw;
            height: 50vh;
            font-size: 32px;
        }
        
        .a {
            background-color: red;

        }
        
        .b {

        /*글꼴 선언*/
        
        @font-face {
            font-family: "myFont";
            src: url("./font/NanumPenScript-Regular.ttf");
        }
        /*글꼴 적용*/
        
        * {
            font-family: myFont, 궁서체;
        }

<body>
    <!-- 단위 : px vs em vs rem -->
    <div class="outer">
        단위 : px vs em vs rem
        <div class="a">em: 부모노드를 기준으로..</div>
        <div class="b">rem: root노드를 기준으로..</div>
        <div class="c">px: 해상도를 기준으로..</div>
    </div>
