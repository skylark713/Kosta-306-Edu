<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      #wrap {
        width: 1100px;
        padding: 0 0 50px 0px;
        border: 2px solid #666;
        margin: 0 auto;
      }

      header {
        width: 100%;
        height: 100px;
        background-color: red;
      }

      #slider {
        width: 100%;
        height: 300px;
        background-color: cyan;
      }

      #contents {
        width: 1100px;
        height: 600px;
        background-color: tomato;
      }

      #product {
        width: 900px;
        height: 200px;
        background-color: gold;
        margin: 50px 0 0 100px;
        float: left;
      }
    </style>
  </head>

  <body>
    <div id="wrap">
      <header>header영역</header>

      <div id="slider">slider 영역</div>

      <section id="contents">
        <article id="product">
          <h3>신상품</h3>
          <div class="new">상품1</div>
          <div class="new">상품2</div>
          <div class="new">상품3</div>
          <div class="new">상품4</div>
          <div class="new">상품5</div>
          <div class="new">상품6</div>
        </article>

        <article id="brand">
          <h3>베스트 브랜드</h3>
          <div class="best">best1</div>
          <div class="best">best2</div>
          <div class="best">best3</div>
          <div class="best">best4</div>
        </article>
      </section>

      <footer>footer영역</footer>
    </div>
  </body>
</html>
