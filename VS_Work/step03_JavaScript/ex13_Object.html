<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>

  <body>
    <h1>Object key와 value</h1>
    <script>
      const person = {
        name: "희정",
        age: 20,
        print: function () {
          return this.name + "님 나이는 " + this.age + "살입니다.";
        },
      };

      console.log(person);
      console.log(person.name);
      console.log(person.age);
      console.log(person["age"]);
      console.log(person.print());

      console.log("-----------------------------");
      ////////////////////////////////////////
      //Object의 key와 value의 정보를 알고싶다.
      let keys = Object.keys(person);
      console.log(keys);

      let values = Object.values(person);
      console.log(values);

      //Object의 key와 value를 한 쌍으로 가져오고 싶다.
      for (let key of keys) {
        console.log(key + " = " + person[key]); //person.key 안된다.
      }

      console.log("--test----");

      for (let p in person) {
        console.log(person);
        console.log(person[p]);
      }
    </script>
  </body>
</html>
