<!DOCTYPE html>
<html>
<head>
<meta charset="EUC-KR">
<title>Insert title here</title>
<style type="text/css">
  #result{width: 200px; height: 150px; border: 1px red solid;}
</style>

</head>
<body>
<h2>계산해보자</h2>
<button>계산</button>
<div id="result"></div>

<script type="text/javascript">
	let cal = ()=>{
		// let no1 = parseInt(prompt("첫번째 수?",5)); // a10 --> NaN     // 10a
		 //let no2 = parseInt(prompt("두번째 수?",5)); //

		 let no1 = Number(prompt("첫번째 수?",5)); // a10 --> NaN     // 10a  --> NaN
		 let no2 = Number(prompt("두번째 수?",5));
		 
		 let oper = prompt("연산기호(+,-,*,/)?","+");
	 
		 if(isNaN(no1) || isNaN(no2)){//숫자가 아니니?
			 alert("숫자만 입력하세요^^");
		     confirm("다시할래?") ?  cal() : alert("다음에 이용해주세요.");
		 }else{
			let divEle = document.getElementById("result");
			 let result ="";
			 switch (oper) {
			   case "+": result = no1+no2;
			    divEle.innerHTML = "<h4>"+no1 + oper + no2 + "=" + result +"</h4>"; break;
			   case "-": result = no1-no2;
			    divEle.innerHTML = "<h4>"+no1 + oper + no2 + "=" + result +"</h4>"; break;
			   case "*": result = no1*no2;
			    divEle.innerHTML = "<h4>"+no1 + oper + no2 + "=" + result +"</h4>";break;
			   case "/": result = no1/no2;
			    divEle.innerHTML = "<h4>"+no1 + oper + no2 + "=" + result +"</h4>"; break;
			   default:
				alert("연산기호를 잘못입력했어요^^");
			    confirm("다시 할래요?") ? cal() : alert("잘가요~");  	 
			 }
			
		 }//else끝
	   
 	}

//이벤트 등록
document.querySelector("button").addEventListener("click", cal);


</script>
</body>
</html>
