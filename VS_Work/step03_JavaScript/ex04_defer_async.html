<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <!-- 
     외부의 js파일 연결
      defer 는 비동기화로 병렬  처리가 된다. async와 다르게 
        dom 파싱이이 다 완료된 후에 실행된다.
      - **defer** = DOM 파싱 끝난 뒤 실행, 순서 보장
      - **async** = 다운로드 끝나자마자 실행, 순서 보장 안 됨
    -->
    <!-- <script src="./js/test.js"></script> -->
    <!-- <script src="./js/test.js" defer></script> -->
    <script src="./js/test.js" async></script>
  </head>

  <body>
    <h1 onclick="text(this)">JavaScript 시작하기</h1>

    <script>
      document.write("<p>중간에 출력</p>");
      console.log("2.나오나?");
    </script>

    <h2 id="h2">마우스 올려봐</h2>
    <script>
      // 1. h1를 찾는다. (dom 즉 h1객체를 찾는다!!!) - id 로 element 찾기
      console.log("3=" + document.getElementById("h2")); // 제대로 뜸
    </script>
  </body>
</html>
