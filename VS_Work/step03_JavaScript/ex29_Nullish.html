<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>

  <body>
    <h1>Nullish 문법 = 값1 ?? 값2</h1>

    <!--null 또는 undefined일 때만 대체값을 반환하는 연산자-->
    <script>
      {
        const name = "hee";
        const userName = name ?? "Guest";

        console.log("이름은 " + userName);
      }

      {
        const name = null;
        const userName = name ?? "Guest";

        console.log("이름은 " + userName);
      }

      {
        const name = 0;
        const userName = name ?? "Guest";

        console.log("이름은 " + userName);
      }

      {
        const name = undefined;
        const userName = name ?? "Guest";

        console.log("이름은 " + userName);
      }
      console.log("-- null or undefined 인 경우에만 false 보자 ---");

      {
        const name = "hee";
        const userName = name || "Guest";

        console.log("이름은 " + userName);
      }

      {
        const name = null;
        const userName = name || "Guest";

        console.log("이름은 " + userName);
      }

      {
        const name = 0;
        const userName = name || "Guest";

        console.log("이름은 " + userName);
      }

      {
        const name = undefined;
        const userName = name || "Guest";

        console.log("이름은 " + userName);
      }
    </script>
  </body>
</html>
