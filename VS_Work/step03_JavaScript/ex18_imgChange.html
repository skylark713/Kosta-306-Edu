<!doctype html>
<html>
  <head>
    <title>New Document</title>
    <meta charset="utf-8" />
    <script type="text/javascript">
      onload = function () {
        //img를 1초마다 갱신
        let imgName = ["monkey.gif", "lion.gif", "cat.gif", "dog.gif"];
        let index = 0;
        let imgChange = function () {
          //   console.log(1);
          document.images[0].src = "img/" + imgName[index++];
          if (index === imgName.length) {
            index = 0;
          }
        };

        //1초마다 imgChange 호출해보자
        let imgStop = setInterval(imgChange, 1000);

        ///////////////////////////////////
        //첫 번째 이미지에 마우스 over
        document.images[0].addEventListener(
          "mouseover",
          () => {
            if (imgStop) clearInterval(imgStop);
          },
          false,
        );

        //첫 번째 이미지에 마우스 out
        document.images[0].addEventListener(
          "mouseout",
          () => {
            imgStop = setInterval(imgChange, 1000);
          },
          false,
        );

        /////////////////////////////////////////////////

        document.querySelectorAll("span").forEach((spanEle) => {
          //   console.log(spanEle);
          spanEle.addEventListener(
            "click",
            function () {
              //현재 클릭된 span에 따라 첫 번째 이미지 src속성을 변경한다.
              //   console.log(event.target);
              //   console.log(this);
              //   let imgName = this.getAttribute("data-img-name");
              let imgName = this.dataset.imgName; //dataset을 사용할 때 data- 는 생략. -은 camel표기법으로 변경.
              console.log(imgName);
              document.images[0].src = "./img/" + imgName;
            },
            false,
          );
        });
        //////////////////////////////////////////////////////
        //이미지 위에 over or out
        document.querySelectorAll("[class=imgOverOut]").forEach((imgEle) => {
          imgEle.addEventListener(
            "mouseover",
            function () {
              event.target.width *= 2; //event.target.width = event.target.width*2
              event.target.height *= 2;
            },
            false,
          );
          imgEle.addEventListener(
            "mouseout",
            function () {
              event.target.width /= 2; //event.target.width = event.target.width/2
              event.target.height /= 2;
            },
            false,
          );
        });
      }; //load 끝
    </script>
  </head>

  <body>
    <img src="img/cat.gif" /><br /><br />

    <span data-img-name="monkey.gif">[ 원숭이 ]</span> &nbsp;&nbsp;
    <span data-img-name="lion.gif">[ 사자 ]</span> &nbsp;&nbsp;
    <span data-img-name="cat.gif">[ 고양이 ]</span> &nbsp;&nbsp;
    <span data-img-name="dog.gif">[ 강아지 ]</span> &nbsp;&nbsp;

    <hr color="red" />

    <img
      src="img/monkey.gif"
      width="70"
      height="60"
      class="imgOverOut"
    />&nbsp;&nbsp;
    <img
      src="img/cat.gif"
      width="70"
      height="60"
      class="imgOverOut"
    />&nbsp;&nbsp;
    <img
      src="img/dog.gif"
      width="70"
      height="60"
      class="imgOverOut"
    />&nbsp;&nbsp;
    <img
      src="img/lion.gif"
      width="70"
      height="60"
      class="imgOverOut"
    />&nbsp;&nbsp;
  </body>
</html>
