<!doctype html>
<html>
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>New Web Project</title>
  </head>

  <body>
    <form name="f">
      <table>
        <tr>
          <th colspan="2" bgcolor="yellow">ID 중복 체크</th>
        </tr>
        <tr>
          <th>ID</th>
          <td>
            <input type="text" name="id" />
            <input type="button" value="사용하기" />
          </td>
        </tr>
      </table>
    </form>

    <script>
      document.querySelector("[type=button]").onclick = function () {
        //id에 입력한 값을 조회해서 opener 창의 text에 value 추가한다.
        opener.document.querySelector("[name=id]").value =
          document.querySelector("[name=id]").value;

        //현재 창 닫기
        self.close();
      };
    </script>
  </body>
