<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script>
      /*
        이벤트 등록방법
        1) 태그에 속성으로 on이벤트종류="기능"

        2) javascript에서 element를 찾아서 등록
            - 이벤트주체.on이벤트종류 = 함수이름
                => 이벤트종류는 모두 소문자 이다!!!
                    함수이름 옆에 () 붙히면 안된다!!!! - 즉시 실행!!!

            - 이벤트주체.addEventListener(이벤트종류, 함수, true|false);
                => 이벤트종류는 소문자이다. / on은 붙히면 안된다.
                => true : 버블링 방식 / false : 캡춰링 방식
                    : 이벤트 전이가 버블링이나 캡춰링을 3번째 인수가 결정함
                    : IE는 false 만 지원. (거의 false)

        body에 마크업된 elemet를 찾는 방법
        1) id로 찾기
        2) class속성으로 찾기 - document.getElementByClassName("클래스이름");
        3) 태그이름으로 찾기 - document.getElementByTagName("태그이름");
        4) name으로 찾기 - document.getElementByName("name이름");

            * 2), 3), 4)인 경우는 결과가 배열로 나온다(NodeList) (index관리 필수)

        5) selector=선택자를 이용해서 찾기
            document.querySelector("selector"); - 결과가 한개

            document.querySelectorAll("selector"); - 결과가 한개 이상
        */

      ///////함수 작성//////////////////////
      const test01 = (th) => {
        console.log("클릭1 눌렀어요.");
        console.log(th);
        th.style.color = "red";
      };

      const test02 = function () {
        console.log("클릭2를 눌렀어요.");
        //이벤트를 발생시키는 주체를 어떻게 알 수 있을까?
        let et = event.target;
        //console.log(et);
        et.style.border = "solid red 3px";
      };

      //이벤트 등록
      onload = function () {
        //let btn2 = document.getElementById("btn2");
        let btn2 = document.querySelector("#btn2");
        //console.log(btn2);

        btn2.onclick = test02;

        //button 3번째에 이벤트 등록하기
        let btnNodeList = document.querySelectorAll("button"); //<button 찾기
        console.log(btnNodeList);

        //btnNodeList[2].addEventListener("click", test02, false);
        btnNodeList[2].addEventListener(
          "click",
          function () {
            event.target.style.fontSize = "30px";
          },
          false,
        );

        //버튼 4개에 mouseover와 mouseout 이벤트 적용
        document.querySelectorAll("button").forEach(function (ele, index) {
          //console.log(index + " , " + ele);
          ele.onmouseover = () => {
            event.target.style.width = "300px";
            event.target.style.height = "100px";
          };

          ele.addEventListener(
            "mouseout",
            function () {
              event.target.style.width = "50px";
              event.target.style.height = "30px";
            },
            false,
          );
        });
      }; //onload 이벤트 끝
    </script>
  </head>

  <body>
    <h2>이벤트 처리하기</h2>
    <button onClick="test01(this)">클릭1</button><br /><br />
    <button id="btn2">클릭2</button><br /><br />
    <button>클릭3</button><br /><br />
    <button>클릭4</button>
  </body>
</html>
