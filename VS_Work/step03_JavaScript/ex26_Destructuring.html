<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>

  <body>
    <h1>Destructuring - 구조분해 할당</h1>
    <!-- 객체({})나 배열([])의 값을 쉽게 꺼내어 변수에 할당 할 수 있도록 하는 문법-->
    <script>
      //1.객체
      const emp = {
        empno: 10,
        ename: "hee",
        job: "teacher",
      };
      {
        //emp객체에 있는 속성의 값을 변수에 담고 싶다. - 기존방식
        let empno = emp.empno;
        let ename = emp.ename;
        let job = emp.job;

        console.log(empno, ename, job);
      }

      //새로운 문법 - 구조분해 할당
      {
        let { empno, ename, job } = emp;

        console.log(empno, ename, job);
      }

      {
        //원하는 것만 가져올 수 있다.
        let { empno, job } = emp;

        console.log(empno, job);
      }

      //없는 속성값 - 기본값 설정
      //없는 속성은 undefined인데 기본값 설정하면 기본값
      //있는 속성에 기본값 설정해도 기본값이 아닌 객체에 있는 값이 할당
      {
        let { empno, job = "student", age = 20 } = emp;

        console.log(empno, job, age);
      }

      //key와 변수이름이 다른 경우...
      {
        let { empno: no, job = "student", age = 20 } = emp;

        console.log(no, job, age);
      }

      //배열 - Array/////////////////////////////////
      const jobs = ["학생", "강사"];

      {
        //기존 방식
        let first = jobs[0];
        let second = jobs[1];

        console.log(first, second);
      }

      {
        //구조분해 할당
        let [first, second] = jobs;

        console.log(first, second);
      }

      const numbers = [10, 20, 30, 40, 50, 60, 70];
      {
        let [a, b, c] = numbers;

        console.log(a, b, c); //10 20 30
      }

      {
        let [, a, , , , b, c] = numbers;

        console.log(a, b, c); //20 60 70
      }

      //a와 b의 값을 교환
      {
        let a = 5,
          b = 3;
        let temp = a;
        a = b;
        b = temp;
        console.log(a, b);
      }

      console.log("구조분해할당으로 데이터교환");
      {
        let a = 5,
          b = 3;
        console.log(a, b);
        [b, a] = [a, b]; //let으로 다시 선언X
        console.log(a, b);
      }

      //////////////////////////////////////////
      //함수 리턴하는 값을 구조분해 할당으로 받기
      const test = function () {
        //기능
        return [10, 20, 30];
      };

      let result = test();
      console.log(result[0], result[2]);

      let [a, , b] = test();
      console.log(a, b);

      const test2 = function () {
        //기능
        return {
          name: "미미",
          age: 20,
          addr: "서울",
        };
      };

      result = test2();
      console.log(result.age, result.name);

      let { addr, name } = test2(); //순서는

      //단축 속성명 사용하기/////////////////////
      {
        let name = "heejung";
        let age = 30;
        let addr = "제주";

        //객체
        let person = {
          name: name,
          age: age,
          addr: addr,
        };

        console.log(person);

        //////////////////////
        let person2 = {
          name,
          age,
          addr,
        };

        console.log(person2);
      }
    </script>
  </body>
</html>
